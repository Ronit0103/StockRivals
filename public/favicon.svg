<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1f1f23"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="256" cy="256" r="220"
          fill="url(#bg)"
          stroke="#2a2a2e"
          stroke-width="6"/>

  <!-- Main icon -->
  <g fill="#f97316" filter="url(#softShadow)">

    <!-- Stylized R + arrow -->
    <path d="
      M160 360
      L300 210
      L360 210
      L330 180
      L260 180
      L200 250
      L200 160
      Q200 130 240 130
      L320 130
      Q370 130 370 180
      Q370 220 330 220
      L300 220
      L420 100
      L450 160
      L420 100
      L420 100
      Z" />

    <!-- Candlesticks -->
    <rect x="210" y="300" width="18" height="60" rx="3"/>
    <rect x="245" y="280" width="18" height="80" rx="3"/>
    <rect x="280" y="300" width="18" height="60" rx="3"/>
    <rect x="315" y="260" width="18" height="100" rx="3"/>
    <rect x="350" y="230" width="18" height="130" rx="3"/>

  </g>
</svg>
